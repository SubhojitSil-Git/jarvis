<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS MARK VI: SENTIENT</title>
    <link rel="stylesheet" href="do.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@google/generative-ai": "https://esm.run/@google/generative-ai"
            }
        }
    </script>
</head>
<body>

    <div id="start-overlay">
        <div class="scanner-line"></div>
        <div class="start-title">JARVIS</div>
        <div class="start-subtitle">MARK VI · SENTIENT CORE</div>
        <button id="start-btn">INITIALIZE SYSTEM</button>
        <div class="sys-msg">NEURAL LINK STANDBY...</div>
    </div>

    <div id="hud-layer">
        <div id="reticle"><div id="reticle-inner"></div></div>
        
        <div id="subtitle-box">AWAITING INPUT...</div>

        <div class="hud-panel top-left">
            <h1>JARVIS <span class="version">mk.6</span></h1>
            <div class="row">VOICE: <span id="voice-status">OFFLINE</span></div>
            <div class="row">GESTURE: <span id="gesture-status">NONE</span></div>
            <div class="row">AI BRAIN: <span id="ai-status">LOCAL</span></div>
            <div class="llm-controls">
                <button id="mode-toggle" class="hud-btn">[ LOCAL MODE ]</button>
                <select id="model-select" class="hud-select">
                    <option>LOADING...</option>
                </select>
            </div>
        </div>

        <div class="hud-panel bottom-right">
            <h1>VISUAL INPUT</h1>
            <div class="cmd-item" id="cmd-palm">[🖐 PALM] REPULSOR</div>
            <div class="cmd-item" id="cmd-fist">[✊ FIST] GRAVITY</div>
            <div class="cmd-item" id="cmd-point">[☝ POINT] LASER</div>
            <div class="cmd-item" id="cmd-pinch">[👌 PINCH] FREEZE</div>
            <div class="cmd-item" id="cmd-rock">[🤘 ROCK] CHAOS</div>
        </div>
    </div>

    <video id="video-input" playsinline></video>

    <script type="module" src="do.js"></script>
</body>
</html>
